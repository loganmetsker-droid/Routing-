apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: routing-dispatch-ingress
  namespace: routing-dispatch
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - routing-dispatch.example.com
      secretName: routing-dispatch-tls
  rules:
    - host: routing-dispatch.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
