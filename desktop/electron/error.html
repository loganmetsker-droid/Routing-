<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trovan Startup Error</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #1a252f;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: 90%;
        max-width: 700px;
        background: #fff;
        border: 1px solid rgba(26, 37, 47, 0.12);
        border-radius: 10px;
        box-shadow: 0 8px 20px -18px rgba(15, 23, 32, 0.24);
        padding: 28px;
      }
      .wordmark {
        color: #c27a44;
        font-weight: 800;
        letter-spacing: 0.12em;
        font-size: 12px;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 22px;
      }
      p {
        margin: 0 0 10px 0;
        color: #5a6d7e;
      }
      code {
        display: block;
        margin-top: 8px;
        padding: 10px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid rgba(26, 37, 47, 0.12);
        color: #8c2d2d;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wordmark">TROVAN</div>
      <h1>Startup failed</h1>
      <p>The desktop wrapper could not bring all required services to healthy state.</p>
      <p id="kind"></p>
      <p id="msg">See logs for details.</p>
      <p id="log"></p>
      <code>Check: scripts/start_stable.sh and scripts/healthcheck.sh</code>
    </div>
    <script>
      if (window.trovanDesktop) {
        window.trovanDesktop.onStartupError((payload) => {
          const code = payload?.code || 'startup_failed';
          const kindMap = {
            db_unavailable: 'Dependency failure: database unavailable',
            backend_health_unavailable: 'Dependency failure: backend failed to boot',
            frontend_health_unavailable: 'Dependency failure: frontend failed to boot',
            worker_queue_unavailable: 'Dependency failure: queue or worker unavailable',
            backend_frontend_health_unavailable: 'Dependency failure: backend + frontend unavailable',
            startup_failed: 'Dependency failure: startup orchestration failed'
          };
          document.getElementById('kind').textContent = kindMap[code] || `Dependency failure: ${code}`;
          document.getElementById('msg').textContent = payload?.message || 'Unknown startup error';
          document.getElementById('log').textContent = payload?.logPath ? `Log file: ${payload.logPath}` : '';
        });
      }
    </script>
  </body>
</html>
