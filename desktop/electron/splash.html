<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trovan Startup</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #1a252f;
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        width: 86%;
        max-width: 560px;
        background: #fff;
        border: 1px solid rgba(26, 37, 47, 0.12);
        border-radius: 10px;
        box-shadow: 0 8px 20px -18px rgba(15, 23, 32, 0.24);
        padding: 28px;
      }
      .wordmark {
        color: #c27a44;
        font-weight: 800;
        letter-spacing: 0.12em;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .desc {
        color: #5a6d7e;
        font-size: 14px;
        margin-bottom: 16px;
      }
      .bar {
        width: 100%;
        height: 8px;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(26, 37, 47, 0.08);
      }
      .bar > div {
        width: 35%;
        height: 100%;
        background: #c27a44;
        animation: load 1.2s ease-in-out infinite alternate;
      }
      @keyframes load {
        from { width: 20%; }
        to { width: 85%; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wordmark">TROVAN</div>
      <div class="title">Routing & Dispatch Desktop</div>
      <div class="desc">Starting backend and frontend services, then validating health checks.</div>
      <div class="bar"><div></div></div>
    </div>
  </body>
</html>
