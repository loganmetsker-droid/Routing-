name: Trovan CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build And Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: routing_dispatch_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d routing_dispatch_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_NAME: routing_dispatch_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret
          AUTH_PROVIDER: local-config
          ALLOW_LOCAL_AUTH: 'true'
          AUTH_ADMIN_EMAIL: admin@example.com
          AUTH_ADMIN_PASSWORD: ChangeMe123!

  migration-check:
    name: Backend Migration Check
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: routing_dispatch_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d routing_dispatch_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend migrations
        run: npm run migration:run --workspace=backend
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_NAME: routing_dispatch_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET: ci-test-secret

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: migration-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Trigger Vercel staging deploy
        run: curl -fsSL -X POST "${{ secrets.VERCEL_STAGING_DEPLOY_HOOK_URL }}"

      - name: Trigger Render staging deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}"

      - name: Wait for deploy hooks
        run: sleep 45

      - name: Smoke staging frontend
        run: curl -fsSL "${{ secrets.STAGING_FRONTEND_URL }}"

      - name: Smoke staging backend readiness
        run: curl -fsSL "${{ secrets.STAGING_BACKEND_URL }}/health/readiness"

  deploy-production:
    name: Promote Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger Vercel production deploy
        run: curl -fsSL -X POST "${{ secrets.VERCEL_PRODUCTION_DEPLOY_HOOK_URL }}"

      - name: Trigger Render production deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}"

      - name: Wait for deploy hooks
        run: sleep 45

      - name: Smoke production frontend
        run: curl -fsSL "${{ secrets.PRODUCTION_FRONTEND_URL }}"

      - name: Smoke production backend readiness
        run: curl -fsSL "${{ secrets.PRODUCTION_BACKEND_URL }}/health/readiness"
